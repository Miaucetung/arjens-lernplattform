# ════════════════════════════════════════════════════════
# CI/CD Pipeline – Arjens Lernplattform
# ════════════════════════════════════════════════════════
# Trigger: Push auf main
# Steps: Lint → Build Image → Push to GHCR → Deploy to K8s
# ════════════════════════════════════════════════════════

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ═══════════════════════════════════
  # Job 1: Lint & Type Check
  # ═══════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      # - run: npm run lint

  # ═══════════════════════════════════
  # Job 2: Build & Push Container
  # ═══════════════════════════════════
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════
  # Job 3: Deploy to Kubernetes
  # ═══════════════════════════════════
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy with Kustomize
        run: |
          # Image-Tag auf den aktuellen SHA setzen
          cd k8s
          kubectl kustomize . | \
            sed "s|ghcr.io/OWNER/arjens-lernplattform:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" | \
            kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/lernplattform \
            -n lernplattform \
            --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get pods -n lernplattform -l app=lernplattform
          echo "---"
          kubectl get ingress -n lernplattform
