apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lernplattform
  namespace: lernplattform
  labels:
    app: lernplattform
    app.kubernetes.io/name: lernplattform
    app.kubernetes.io/part-of: arjens-lernplattform
  annotations:
    # ── Cloudflare-kompatibel (kein eigenes Cert nötig bei CF Proxy) ──
    # Falls du cert-manager nutzt, aktiviere diese Zeilen:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    #
    # ── Traefik Ingress Controller ──
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  # TLS – aktiviere wenn du cert-manager/eigenes Cert nutzt
  # tls:
  #   - hosts:
  #       - arjens-lernplattform.ajti.online
  #     secretName: lernplattform-tls
  rules:
    - host: arjens-lernplattform.ajti.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lernplattform
                port:
                  name: http
