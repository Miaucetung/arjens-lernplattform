apiVersion: apps/v1
kind: Deployment
metadata:
  name: lernplattform
  namespace: lernplattform
  labels:
    app: lernplattform
    app.kubernetes.io/name: lernplattform
    app.kubernetes.io/part-of: arjens-lernplattform
    app.kubernetes.io/component: web
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: lernplattform
  template:
    metadata:
      labels:
        app: lernplattform
        app.kubernetes.io/name: lernplattform
        app.kubernetes.io/component: web
    spec:
      # Auf ssf2 schedulen
      nodeSelector:
        kubernetes.io/hostname: ssf2
      containers:
        - name: lernplattform
          image: ghcr.io/miaucetung/arjens-lernplattform:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://arjens-lernplattform.ajti.online"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30
